<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cute Moments is the ultimate romantic experience for couples. Send virtual hugs, create beautiful digital scrapbooks, write emotional love letters, and cherish your relationship memories with interactive features." />
    <meta name="keywords" content="romantic moments, cute relationship app, virtual hug for girlfriend, virtual hug for boyfriend, romantic scrapbook, love calculator, couple memories, valentine surprise, romantic gift ideas, relationship app" />
    <meta name="theme-color" content="#d63384" />
    <meta name="google-site-verification" content="yXQivvAEj4qUbISTD9AMVhyAPkVPkZbiU4Rro8ci0qM" />
    <meta name="google-site-verification" content="1825ede031e495da" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" />
    <title>Cute Moments | A Romantic Experience</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cute Moments",
      "url": "https://cute-moments.vercel.app/",
      "description": "The ultimate romantic experience for couples to share virtual hugs, scrapbooks, and memories.",
      "applicationCategory": "Relationship",
      "operatingSystem": "All"
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script>
      // Extra Security: Prevent Right-Click and Inspect
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
